<!-- Site footer -->
<footer class="mt-16 border-t border-gray-200 bg-gray-50">
    <div class="mx-auto max-w-6xl px-4 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
        <p class="text-sm text-meta">&copy; {{ 'now' | date: '%Y' }} {{ site.name }}</p>
        <ul class="flex items-center gap-5">
            <li>
                <a href="{{ site.social.github }}" target="_blank" rel="noopener noreferrer" title="GitHub"
                   class="inline-flex items-center justify-center w-11 h-11 text-ink hover:text-accent transition">
                    <i class="fab fa-github text-2xl"></i>
                </a>
            </li>
            <li>
                <a href="{{ site.social.linkedin }}" target="_blank" rel="noopener noreferrer" title="LinkedIn"
                   class="inline-flex items-center justify-center w-11 h-11 text-ink hover:text-accent transition">
                    <i class="fab fa-linkedin text-2xl"></i>
                </a>
            </li>
            <li>
                <a href="{{ site.social.googlescholar }}" target="_blank" rel="noopener noreferrer" title="Publications"
                   class="inline-flex items-center justify-center w-11 h-11 text-ink hover:text-accent transition">
                    <i class="fas fa-book text-2xl"></i>
                </a>
            </li>
            <li>
                <a href="mailto:{{ site.social.email }}" title="Email"
                   class="inline-flex items-center justify-center w-11 h-11 text-ink hover:text-accent transition">
                    <i class="fas fa-paper-plane text-2xl"></i>
                </a>
            </li>
        </ul>
